name: visa_agent
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.2

  # Plugins
  syncfusion_flutter_datepicker:
  device_info_plus: ^12.4.0
  flutter_web_auth: ^0.6.0
  package_info_plus: ^9.0.1
  path_provider: ^2.0.9
  url_launcher: ^6.1.14

  # Code Management
  freezed_annotation:
  json_annotation:

  # Architecture
  go_router: ^17.2.3
  auto_route: ^11.1.0
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  provider: ^6.0.2
  equatable: ^2.0.5

  # Networking
  dio: ^5.3.3
  dio_cache_interceptor: ^3.5.1
  dio_cache_interceptor_file_store: ^1.2.2
  dio_smart_retry: ^7.0.1
  pretty_dio_logger: ^1.3.1

  # Storage
  flutter_cache_manager: ^3.3.0
  flutter_secure_storage: ^10.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.0.13

  # UI / Widgets
  flutter_keyboard_visibility: ^6.0.0
  flutter_markdown: ^0.7.7+1
  lazy_load_indexed_stack: ^1.0.0
  linked_scroll_controller: ^0.2.0
  google_maps_flutter:
  flutter_address_from_latlng:
  shimmer: ^3.0.0
  simple_animations: ^5.0.0+3
  flutter_spinkit: ^5.2.1

  # Image Handling
  cached_network_image:
  cloudinary_public: ^0.23.1
  cropperx: ^1.1.1
  flutter_svg: ^2.0.7
  flutter_svg_provider: ^1.0.4
  image_picker: ^1.2.2

  # Utilities
  collection: ^1.17.1
  diff_match_patch: ^0.4.1
  encrypt: ^5.0.3
  flutter_timezone: ^5.0.2
  firebase_crashlytics: ^5.2.0
  firebase_core: ^4.7.0
  platform: ^3.1.0
  crypto: ^3.0.3
  http_parser: ^4.0.2
  smooth_page_indicator: ^2.0.1

  # Push notifications

  # Permissions for push notifications
  permission_handler: ^12.0.1

  # Twilio
  twilio_phone_verify: ^2.0.0
  twilio_flutter: ^0.0.9


  # OTP phone login
  pin_code_fields: ^9.3.0
  lottie: ^3.0.0
  intl_phone_field: ^3.2.0
  country_pickers: ^3.0.1

  rename: ^3.0.1
  country_picker: ^2.0.25
  file_picker: ^11.0.2
  flutter_launcher_icons: ^0.14.4
  local_auth: ^3.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  intl_translation:
  analyzer: ^8.4.1

  # Testing
  bloc_test: ^10.0.0
  mockito: ^5.4.2
  mocktail: ^1.0.5
  golden_toolkit: ^0.15.0
  fake_async: ^1.3.1
  http_mock_adapter: ^0.6.1

  # Code gen
  auto_route_generator: ^10.4.0
  build_runner: ^2.4.8
  freezed: ^3.2.3
  json_serializable: ^6.2.0

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  generate: true
  assets:
    - images/
    - images/lottie/
    - images/illustrations/
    - images/svg/
    - images/placeholders/profile/
    - images/placeholders/content/abstract/
    - images/placeholders/content/icon_patterns/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware.

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  fonts:
    - family: Antonia
      fonts:
        - asset: fonts/AntoniaH1-Black.otf
          weight: 900
    - family: Univers
      fonts:
        - asset: fonts/UniversNextProBlack.ttf
        - asset: fonts/UniversNextProBold.ttf
        - asset: fonts/UniversNextProHeavy.ttf
        - asset: fonts/UniversNextProItalic.ttf
        - asset: fonts/UniversNextProLight.ttf
        - asset: fonts/UniversNextProMedium.ttf
        - asset: fonts/UniversNextProRegular.ttf
        - asset: fonts/UniversNextProThin.ttf
        - asset: fonts/UniversNextProUltraLight.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "images/app_icon.png"
  adaptive_icon_background: "#ffffff"
